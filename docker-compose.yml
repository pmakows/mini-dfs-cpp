services:
  metadata:
    build: .
    command: ./metadata_service
    ports:
      - "9000:8080"
    volumes:
      - metadata_data:/data

  storage1:
    build: .
    command: ./storage_node
    ports:
      - "9001:8080"
    volumes:
      - storage1_data:/data

  storage2:
    build: .
    command: ./storage_node
    ports:
      - "9002:8080"
    volumes:
      - storage2_data:/data

  storage3:
    build: .
    command: ./storage_node
    ports:
      - "9003:8080"
    volumes:
      - storage3_data:/data

volumes:
  metadata_data:
  storage1_data:
  storage2_data:
  storage3_data: