version: "3.9"

services:
  metadata:
    build: .
    command: ./metadata_service
    ports:
      - "9000:8080"
    volumes:
      - metadata_data:/data

  storage1:
    build: .
    command: ./storage_node
    ports:
      - "9001:8080"
    volumes:
      - storage1_data:/data

volumes:
  metadata_data:
  storage1_data: